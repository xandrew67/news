<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AU News — Post Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --muted: #666;
      --accent: #1d4ed8;
      --green: #15803d;
      --green-bg: #dcfce7;
      --red: #b91c1c;
      --red-bg: #fee2e2;
      --yellow: #92400e;
      --yellow-bg: #fef3c7;
      --score-high: #15803d;
      --score-mid: #b45309;
      --score-low: #b91c1c;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .meta {
      font-size: 13px;
      color: var(--muted);
    }

    .btn-run {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .btn-run:hover:not(:disabled) {
      background: #f3f4f6;
      border-color: #9ca3af;
    }

    .btn-run:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .btn-run.running {
      color: var(--accent);
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .run-status {
      font-size: 12px;
      color: var(--muted);
    }

    .run-status.error { color: var(--red); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ── Tabs ────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 2px;
      padding: 16px 24px 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e5e7eb;
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      border-radius: 10px;
      padding: 1px 6px;
      margin-left: 6px;
    }

    .tab.active .badge { background: #dbeafe; color: var(--accent); }

    /* ── Main content ────────────────────────────────────────────────── */
    main {
      max-width: 820px;
      margin: 24px auto;
      padding: 0 24px;
    }

    /* ── Empty state ─────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }

    .empty p { margin-top: 8px; font-size: 14px; }

    /* ── Post card ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .score-badge {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
    }

    .score-badge span { font-size: 9px; font-weight: 500; margin-top: 2px; opacity: .8; }
    .score-high { background: var(--green-bg); color: var(--score-high); }
    .score-mid  { background: var(--yellow-bg); color: var(--score-mid); }
    .score-low  { background: var(--red-bg); color: var(--score-low); }

    .card-meta { flex: 1; min-width: 0; }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-sub {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      background: #f3f4f6;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-tag {
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-approved { background: var(--green-bg); color: var(--green); }
    .status-rejected { background: var(--red-bg); color: var(--red); }
    .status-pending  { background: #dbeafe; color: var(--accent); }

    /* ── Card body ───────────────────────────────────────────────────── */
    .card-body { padding: 14px 16px; }

    .summary {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 10px;
    }

    .facts {
      margin-bottom: 10px;
    }

    .facts-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
    }

    .facts ul {
      padding-left: 16px;
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    .rationale {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 12px;
      padding: 6px 10px;
      background: #f9fafb;
      border-left: 3px solid var(--border);
      border-radius: 0 4px 4px 0;
    }

    /* ── Post editor ─────────────────────────────────────────────────── */
    .post-editor { border-top: 1px solid var(--border); padding: 14px 16px; }

    .editor-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .char-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      font-style: normal;
      text-transform: none;
      letter-spacing: 0;
    }

    .char-count.over { color: var(--red); }

    textarea {
      width: 100%;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color .15s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea:disabled { background: #f9fafb; color: var(--muted); }

    /* ── Card actions ────────────────────────────────────────────────── */
    .card-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 16px 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: opacity .15s, background .15s;
    }

    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-approve {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .btn-approve:hover:not(:disabled) { opacity: .88; }

    .btn-reject {
      background: var(--surface);
      color: var(--red);
      border-color: #fca5a5;
    }

    .btn-reject:hover:not(:disabled) { background: var(--red-bg); }

    .btn-source {
      margin-left: auto;
      background: none;
      color: var(--muted);
      border-color: var(--border);
      font-size: 12px;
    }

    .btn-source:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Loading ─────────────────────────────────────────────────────── */
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>AU News — Post Review</h1>
  <div class="header-right">
    <span class="run-status" id="run-status"></span>
    <button class="btn-run" id="btn-run" onclick="runPipeline()">
      <span id="run-icon">&#9654;</span> Fetch new items
    </button>
    <span class="meta" id="last-refresh"></span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-status="pending">
    Pending <span class="badge" id="badge-pending">0</span>
  </button>
  <button class="tab" data-status="approved">
    Approved <span class="badge" id="badge-approved">0</span>
  </button>
  <button class="tab" data-status="rejected">
    Rejected <span class="badge" id="badge-rejected">0</span>
  </button>
  <button class="tab" data-status="all">
    All <span class="badge" id="badge-all">0</span>
  </button>
</div>

<main>
  <div id="list"><div class="loading">Loading…</div></div>
</main>

<script>
  let currentStatus = 'pending';
  let allItems = [];

  // ── Fetch & render ────────────────────────────────────────────────────────

  async function load() {
    const res = await fetch('/api/posts?status=all');
    allItems = await res.json();
    updateBadges();
    render();
    document.getElementById('last-refresh').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  }

  function updateBadges() {
    const counts = { pending: 0, approved: 0, rejected: 0, all: allItems.length };
    allItems.forEach(i => { counts[i.status] = (counts[i.status] || 0) + 1; });
    ['pending','approved','rejected','all'].forEach(s => {
      const el = document.getElementById('badge-' + s);
      if (el) el.textContent = counts[s] || 0;
    });
  }

  function render() {
    const items = currentStatus === 'all'
      ? allItems
      : allItems.filter(i => i.status === currentStatus);

    const list = document.getElementById('list');
    if (!items.length) {
      list.innerHTML = `<div class="empty">
        <strong>No ${currentStatus === 'all' ? '' : currentStatus + ' '}posts</strong>
        <p>${currentStatus === 'pending'
          ? 'Run the pipeline to fetch and analyse new items.'
          : 'Nothing here yet.'}</p>
      </div>`;
      return;
    }
    list.innerHTML = items.map(buildCard).join('');
  }

  // ── Card builder ──────────────────────────────────────────────────────────

  function scoreClass(s) {
    return s >= 8 ? 'score-high' : s >= 6 ? 'score-mid' : 'score-low';
  }

  function buildCard(item) {
    const isPending = item.status === 'pending';
    const displayText = isPending ? item.draft_text : (item.final_text || item.draft_text);
    const chars = displayText.length;
    const over = chars > 280;

    const factsHtml = item.key_facts && item.key_facts.length
      ? `<div class="facts">
          <div class="facts-label">Key facts</div>
          <ul>${item.key_facts.map(f => `<li>${esc(f)}</li>`).join('')}</ul>
        </div>` : '';

    const rationaleHtml = item.score_rationale
      ? `<div class="rationale">${esc(item.score_rationale)}</div>` : '';

    const statusTag = isPending ? '' :
      `<span class="status-tag status-${item.status}">${item.status}</span>`;

    const actions = isPending
      ? `<div class="card-actions">
          <button class="btn btn-approve" onclick="approve('${item.id}')">Approve</button>
          <button class="btn btn-reject"  onclick="reject('${item.id}')">Reject</button>
          <a class="btn btn-source" href="${esc(item.source_url)}" target="_blank" rel="noopener">
            Source ↗
          </a>
        </div>`
      : `<div class="card-actions">
          <a class="btn btn-source" href="${esc(item.source_url)}" target="_blank" rel="noopener">
            Source ↗
          </a>
        </div>`;

    return `<div class="card" id="card-${item.id}">
      <div class="card-header">
        <div class="score-badge ${scoreClass(item.score)}">
          ${item.score.toFixed(1)}<span>/ 10</span>
        </div>
        <div class="card-meta">
          <div class="card-title">${esc(item.title || item.source_name)}</div>
          <div class="card-sub">
            <span>${esc(item.source_name)}</span>
            ${item.category ? `<span class="tag">${esc(item.category)}</span>` : ''}
            ${statusTag}
            ${item.reviewed_at
              ? `<span>reviewed ${new Date(item.reviewed_at).toLocaleString()}</span>`
              : `<span>queued ${new Date(item.queued_at).toLocaleTimeString()}</span>`}
          </div>
        </div>
      </div>

      <div class="card-body">
        ${item.summary ? `<div class="summary">${esc(item.summary)}</div>` : ''}
        ${factsHtml}
        ${rationaleHtml}
      </div>

      <div class="post-editor">
        <div class="editor-label">
          X post draft
          <span class="char-count ${over ? 'over' : ''}" id="cc-${item.id}">${chars}/280</span>
        </div>
        <textarea
          id="ta-${item.id}"
          ${isPending ? '' : 'disabled'}
          oninput="updateCount('${item.id}')"
        >${esc(displayText)}</textarea>
      </div>

      ${actions}
    </div>`;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Character counter ─────────────────────────────────────────────────────

  function updateCount(id) {
    const ta = document.getElementById('ta-' + id);
    const cc = document.getElementById('cc-' + id);
    if (!ta || !cc) return;
    const n = ta.value.length;
    cc.textContent = n + '/280';
    cc.classList.toggle('over', n > 280);
  }

  // ── Actions ───────────────────────────────────────────────────────────────

  async function approve(id) {
    const ta = document.getElementById('ta-' + id);
    const text = ta ? ta.value.trim() : null;
    if (text && text.length > 280) {
      alert('Post is over 280 characters. Please shorten it before approving.');
      return;
    }
    const btn = document.querySelector(`#card-${id} .btn-approve`);
    setLoading(btn, true);
    await fetch(`/api/posts/${id}/approve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    await load();
  }

  async function reject(id) {
    const btn = document.querySelector(`#card-${id} .btn-reject`);
    setLoading(btn, true);
    await fetch(`/api/posts/${id}/reject`, { method: 'POST' });
    await load();
  }

  function setLoading(btn, on) {
    if (btn) btn.disabled = on;
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentStatus = tab.dataset.status;
      render();
    });
  });

  // ── Run pipeline ─────────────────────────────────────────────────────────

  let pollRunInterval = null;

  async function runPipeline() {
    const btn = document.getElementById('btn-run');
    btn.disabled = true;
    btn.classList.add('running');
    document.getElementById('run-icon').outerHTML = '<span id="run-icon" class="spinner"></span>';
    setRunStatus('', false);

    const res = await fetch('/api/run', { method: 'POST' });
    const data = await res.json();

    if (!data.ok) {
      setRunStatus(data.error || 'Failed to start', true);
      resetRunBtn();
      return;
    }

    // Poll for completion
    pollRunInterval = setInterval(async () => {
      const s = await fetch('/api/run/status').then(r => r.json());
      if (s.status !== 'running') {
        clearInterval(pollRunInterval);
        resetRunBtn();
        if (s.error) {
          setRunStatus('Error: ' + s.error, true);
        } else {
          const n = s.added || 0;
          setRunStatus(n ? `+${n} post${n === 1 ? '' : 's'} queued` : 'No new items', false);
        }
        load(); // Refresh the list
      }
    }, 2000);
  }

  function setRunStatus(msg, isError) {
    const el = document.getElementById('run-status');
    el.textContent = msg;
    el.className = 'run-status' + (isError ? ' error' : '');
  }

  function resetRunBtn() {
    const btn = document.getElementById('btn-run');
    btn.disabled = false;
    btn.classList.remove('running');
    const icon = document.getElementById('run-icon');
    if (icon) icon.outerHTML = '<span id="run-icon">&#9654;</span>';
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  load();
  setInterval(load, 30000); // auto-refresh every 30s
</script>
</body>
</html>
